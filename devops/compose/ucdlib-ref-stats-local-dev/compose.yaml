x-variables:
  main-image: &main-image localhost/local-dev/ucdlib-ref-stats:local-dev
services:
  app:
    image: *main-image
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
    volumes:
      - ../../../services:/services
      - /services/node_modules
    depends_on:
      - db
    ports:
      - ${APP_HOST_PORT:-3000}:${APP_CONTAINER_PORT:-3000}
  backup:
    image: *main-image
    env_file:
      - .env
    depends_on:
      - db
    environment:
      # RUN_BACKUP: true
      APP_ENV: ${APP_ENV:-dev}
      BACKUP_DATA_ENV: ${BACKUP_DATA_ENV:-localhost}
      BACKUP_LOG_TABLE: ${BACKUP_LOG_TABLE:-backup_log}
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
      GOOGLE_APPLICATION_CREDENTIALS: /etc/service-account.json
      GC_BACKUP_BUCKET: 'itis-backups/ucdlib-ref-stats'
      BACKUP_FILE_NAME: 'db.sql.gz'
    # command: /services/backup/entrypoint.sh
    volumes:
      - ../../../services/backup:/services/backup
      - ../../secrets/gc-writer-key.json.json:/etc/service-account.json
  init:
    image: *main-image
    env_file:
      - .env
    depends_on:
      - db
    environment:
      # RUN_INIT: true
      APP_ENV: ${APP_ENV:-dev}
      BACKUP_DATA_ENV: ${BACKUP_DATA_ENV:-prod}
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPASSWORD: 'localhost'
      PGPORT: 5432
      GOOGLE_APPLICATION_CREDENTIALS: /etc/service-account.json
      GC_BACKUP_BUCKET: 'itis-backups/ucdlib-ref-stats'
      BACKUP_FILE_NAME: 'db.sql.gz'
    command: /services/init/init.sh
    volumes:
      - ../../../services/init:/services/init
      - ../../secrets/gc-reader-key.json.json:/etc/service-account.json
  db:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: localhost
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../../../services/pg/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  adminer:
    image: adminer:5
    ports:
      - ${ADMINER_HOST_PORT:-8080}:8080
  redis:
    image: redis:7
  superset:
    image: localhost/local-dev/ucdlib-ref-stats-superset:local-dev
    env_file:
      - .env
    environment:
      SUPERSET_OIDC_CLIENT_ID: ${SUPERSET_OIDC_CLIENT_ID:-ref-stats-superset}
      SUPERSET_OIDC_DISCOVERY_URL: ${SUPERSET_OIDC_DISCOVERY_URL:-https://auth.library.ucdavis.edu/realms/internal/.well-known/openid-configuration}
      PYTHONPATH: /app/pythonpath
      DATABASE_DIALECT: postgresql+psycopg2
      DATABASE_USER: postgres
      DATABASE_PASSWORD: localhost
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: superset
    volumes:
      - ../../../services/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset-home:/app/superset_home
    ports:
      - ${SUPERSET_HOST_PORT:-8088}:8088
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
volumes:
  db-data:
  superset-home: