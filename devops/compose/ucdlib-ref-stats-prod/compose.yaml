x-variables:
  main-image: &main-image us-west1-docker.pkg.dev/digital-ucdavis-edu/pub/ucdlib-ref-stats:main
  superset-image: &superset-image us-west1-docker.pkg.dev/digital-ucdavis-edu/pub/ucdlib-ref-stats-superset:main
services:
  app:
    image: *main-image
    env_file:
      - .env
    environment:
      APP_REPORT_ERRORS_ENABLED: 'true'
      APP_REPORT_ERRORS_URL: 'https://client-error-reporter-akwemh35fa-uw.a.run.app'
      APP_LOGGER_LOG_LEVEL: ${APP_LOGGER_LOG_LEVEL:-warn}
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPORT: 5432
    depends_on:
      - db
    ports:
      - ${APP_HOST_PORT:-3000}:${APP_CONTAINER_PORT:-3000}
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    command: ["npm", "run", "start-client"]
  backup:
    image: *main-image
    restart: always
    env_file:
      - .env
    depends_on:
      - db
    environment:
      RUN_BACKUP: true
      BACKUP_DATA_ENV: ${BACKUP_DATA_ENV:-localhost}
      BACKUP_LOG_TABLE: ${BACKUP_LOG_TABLE:-backup_log}
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPORT: 5432
      GOOGLE_APPLICATION_CREDENTIALS: /etc/service-account.json
      GC_BACKUP_BUCKET: 'itis-backups/ucdlib-ref-stats'
      BACKUP_FILE_NAME: 'db.sql.gz'
    volumes:
      - ../../secrets/gc-writer-key.json:/etc/service-account.json
    command: /services/backup/entrypoint.sh
  init:
    image: *main-image
    env_file:
      - .env
    depends_on:
      - db
    environment:
      # RUN_INIT: true
      BACKUP_DATA_ENV: ${BACKUP_DATA_ENV:-prod}
      PGUSER: 'postgres'
      PGHOST: 'db'
      PGDATABASE: 'postgres'
      PGPORT: 5432
      GOOGLE_APPLICATION_CREDENTIALS: /etc/service-account.json
      GC_BACKUP_BUCKET: 'itis-backups/ucdlib-ref-stats'
      BACKUP_FILE_NAME: 'db.sql.gz'
    volumes:
      - ../../secrets/gc-reader-key.json:/etc/service-account.json
    command: /services/init/init.sh
  db:
    image: postgres:17
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
      - ../../../services/pg/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    restart: always
  superset:
    image: *superset-image
    restart: always
    env_file:
      - .env
    environment:
      SUPERSET_APPLICATION_ROOT: ${SUPERSET_APPLICATION_ROOT:-/dashboards}
      SUPERSET_OIDC_CLIENT_ID: ${SUPERSET_OIDC_CLIENT_ID:-ref-stats-superset}
      SUPERSET_OIDC_DISCOVERY_URL: ${SUPERSET_OIDC_DISCOVERY_URL:-https://auth.library.ucdavis.edu/realms/internal/.well-known/openid-configuration}
      PYTHONPATH: /app/pythonpath
      DATABASE_DIALECT: postgresql+psycopg2
      DATABASE_USER: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_DB: superset
    volumes:
      - superset-home:/app/superset_home
    ports:
      - ${SUPERSET_HOST_PORT:-8088}:8088
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
volumes:
  db-data:
  superset-home: